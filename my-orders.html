<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders – Global Solutions</title>
    <meta name="description"
        content="View your order history, track deliveries, and manage your orders at Global Solutions.">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/my-orders.css">
    <link rel="stylesheet" href="css/chatbot.css">
</head>

<body>

    <!-- ===== HEADER ===== -->
    <header>
        <div class="emergency">EMERGENCY HOTLINE: Are there any current security concerns? 9998020110</div>
        <nav class="logo-home">
            <div class="logo"></div>
            <input type="checkbox" id="nav-toggle" class="nav-toggle">
            <label for="nav-toggle" class="nav-toggle-label"><span></span></label>
            <ul class="list-home">
                <li><a href="home.html">HOME</a></li>
                <li><a href="aboutus.html">ABOUT US</a></li>
                <li><a href="contactus.html">CONTACT US</a></li>
                <li><a href="product.html">PRODUCT</a></li>
                <li><a href="cart.html" class="nav-cart-link" title="View Cart" aria-label="Shopping Cart">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="9" cy="21" r="1" />
                            <circle cx="20" cy="21" r="1" />
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
                        </svg>
                        <span class="nav-cart-badge" style="display:none">0</span>
                    </a></li>
            </ul>
        </nav>
    </header>

    <!-- ===== MY ORDERS PAGE ===== -->
    <div class="orders-page">

        <!-- Page Header -->
        <div class="orders-page-header">
            <h1>My Orders</h1>
            <span class="orders-count-badge" id="orders-count-badge">0 orders</span>
        </div>

        <!-- Filter Tabs -->
        <div class="orders-filter-tabs">
            <button class="filter-tab active" onclick="setActiveFilter(this, 'all')">All Orders</button>
            <button class="filter-tab" onclick="setActiveFilter(this, 'active')">Active</button>
            <button class="filter-tab" onclick="setActiveFilter(this, 'delivered')">Delivered</button>
            <button class="filter-tab" onclick="setActiveFilter(this, 'cancelled')">Cancelled</button>
        </div>

        <!-- Orders Container (dynamically populated) -->
        <div id="orders-container">
            <!-- Rendered by my-orders.js -->
        </div>

    </div>
    <!-- /orders-page -->

    <!-- ===== FOOTER ===== -->
    <footer class="greeting">
        <div class="social">
            <a class="a-linkedin" href="#">
                <div class="linkedin"></div>
            </a>
            <a href="#">
                <div class="facebook"></div>
            </a>
        </div>
    </footer>

    <script src="js/auth.js"></script>
    <script src="js/add-to-cart.js"></script>
    <script src="js/my-orders.js"></script>
    <script src="js/chatbot.js"></script>
</body>

</html>
